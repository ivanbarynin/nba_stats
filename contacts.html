<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Контакты — NBAStats</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-white shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="text-xl font-bold">NBAStats</a>
    <nav class="space-x-6 text-sm font-medium">
      <a href="index.html" class="text-gray-600 hover:text-black">Главная</a>
      <a href="contacts.html" class="text-black border-b-2 border-black pb-1">Контакты</a>
      <a href="faq.html" class="text-gray-600 hover:text-black">FAQ</a>
    </nav>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-20 grid md:grid-cols-2 gap-16">

  <!-- Контакты -->
  <div>
    <h1 class="text-3xl font-semibold mb-6">Свяжитесь с нами</h1>
    <p class="text-gray-600 mb-4">Email: contact@nbastats.com</p>
    <p class="text-gray-600 mb-4">Телефон: +7 (777) 123-45-67</p>
    <p class="text-gray-600 mb-6">Telegram: @nbastats</p>
  </div>

  <!-- Форма -->
  <form class="bg-white p-8 rounded-2xl shadow space-y-6">

    <div>
      <label class="block text-sm mb-2">Имя</label>
      <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-black">
    </div>

    <div>
      <label class="block text-sm mb-2">Email</label>
      <input type="email" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-black">
    </div>

    <div>
      <label class="block text-sm mb-2">Тема</label>
      <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-black">
        <option>Общий вопрос</option>
        <option>Предложение сотрудничества</option>
        <option>Сообщить об ошибке</option>
      </select>
    </div>

    <div>
      <label class="block text-sm mb-2">Сообщение</label>
      <textarea rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-black"></textarea>
    </div>

    <div class="flex items-center">
      <input type="checkbox" class="mr-2">
      <span class="text-sm text-gray-600">Согласие на обработку данных</span>
    </div>

    <button type="submit" class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
      Отправить сообщение
    </button>

  </form>

</section>

<footer class="bg-black text-white py-10 text-center">
  <p class="text-gray-400 text-sm">© 2026 NBAStats</p>
</footer>

</body>
</html>
