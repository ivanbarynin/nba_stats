<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Контакты | NBA Stats</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- HEADER -->

<header class="bg-black text-white">

<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-xl font-bold">
NBA Stats
</h1>

<nav class="space-x-6 text-sm">

<a href="index.html" class="hover:text-gray-300">
Главная
</a>

<a href="matches.html" class="hover:text-gray-300">
Матчи
</a>

<a href="teams.html" class="hover:text-gray-300">
Команды
</a>

<a href="contacts.html" class="text-gray-300">
Контакты
</a>

</nav>

</div>

</header>


<!-- MAIN -->

<main class="flex-grow">

<section class="py-20">

<div class="max-w-2xl mx-auto px-6">

<h1 class="text-3xl font-bold text-center mb-2">
Свяжитесь с нами
</h1>

<p class="text-gray-600 text-center mb-10">
Есть вопросы по статистике NBA или предложения по сайту? Напишите нам.
</p>


<!-- FORM CARD -->

<div class="bg-white shadow-lg rounded-2xl p-8 hover:shadow-xl transition">

<form id="feedbackForm" class="space-y-6">


<!-- FULLNAME -->

<div>

<label class="block text-sm font-medium text-gray-700 mb-1">
ФИО *
</label>

<div class="relative">

<span class="absolute left-3 top-3 text-gray-400">
👤
</span>

<input
class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-3 focus:ring-2 focus:ring-black focus:border-black transition"
type="text"
id="fullname"
placeholder="Иванов Иван Иванович"
/>

</div>

</div>


<!-- PHONE -->

<div>

<label class="block text-sm font-medium text-gray-700 mb-1">
Телефон *
</label>

<div class="relative">

<span class="absolute left-3 top-3 text-gray-400">
📞
</span>

<input
class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-3 focus:ring-2 focus:ring-black focus:border-black transition"
type="tel"
id="phone"
placeholder="+7 (999) 999-99-99"
/>

</div>

</div>


<!-- EMAIL -->

<div>

<label class="block text-sm font-medium text-gray-700 mb-1">
Email *
</label>

<div class="relative">

<span class="absolute left-3 top-3 text-gray-400">
✉️
</span>

<input
class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-3 focus:ring-2 focus:ring-black focus:border-black transition"
type="email"
id="email"
placeholder="mail@example.com"
/>

</div>

</div>


<!-- MESSAGE -->

<div>

<label class="block text-sm font-medium text-gray-700 mb-1">
Сообщение
</label>

<textarea
id="message"
rows="4"
placeholder="Напишите ваше сообщение..."
class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-black focus:border-black transition"
></textarea>

</div>


<!-- AGREEMENT -->

<div class="flex items-start space-x-2">

<input
type="checkbox"
id="agreement"
class="mt-1"
required
/>

<label class="text-sm text-gray-600">
Я согласен на обработку персональных данных
</label>

</div>


<!-- BUTTONS -->

<div class="flex gap-4">

<button
type="submit"
class="flex-1 bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition font-medium"
>

Отправить

</button>

<button
type="reset"
class="flex-1 bg-gray-200 py-3 rounded-lg hover:bg-gray-300 transition"
>

Очистить

</button>

</div>

</form>

</div>

</div>

</section>

</main>


<!-- FOOTER -->

<footer class="bg-black text-white text-center py-6 mt-10">

<p class="text-sm text-gray-400">
Учебный проект по фронтенд-разработке
</p>

</footer>


<!-- SCRIPTS -->

<script src="scripts/validation.js"></script>
<script src="scripts/consoleLogger.js"></script>

</body>
</html>
